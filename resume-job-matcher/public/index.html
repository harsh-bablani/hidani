<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume & Job Matcher</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 0 auto; padding: 20px; background-color: #f5f5f5; }
        .container { background-color: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { color: #333; text-align: center; }
        form { display: flex; flex-direction: column; gap: 15px; margin-bottom: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        label { font-weight: bold; color: #555; }
        input[type="file"] { padding: 10px; border: 1px solid #ccc; border-radius: 4px; background-color: #fafafa; }
        button { padding: 12px; background-color: #0066cc; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; transition: background-color 0.3s; }
        button:hover { background-color: #0052a3; }
        #result { margin-top: 30px; }
        pre { background-color: #2d2d2d; color: #ccc; padding: 15px; border-radius: 4px; overflow-x: auto; }
        .success { color: green; font-weight: bold; }
        .error { color: red; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Resume Job Matcher</h1>
        <p style="text-align: center; color: #666;">Upload a Resume (PDF/TXT) and a Job Description (TXT) to see the matching score.</p>
        
        <form id="matchForm">
            <div class="form-group">
                <label for="resume">Resume (PDF or TXT):</label>
                <input type="file" id="resume" name="resume" accept=".pdf,.txt" required>
            </div>
            
            <div class="form-group">
                <label for="jd">Job Description (TXT):</label>
                <input type="file" id="jd" name="jd" accept=".txt" required>
            </div>
            
            <button type="submit" id="submitBtn">Calculate Match Score</button>
        </form>

        <div id="result" style="display: none;">
            <h3>Matching Result:</h3>
            <pre id="jsonOutput"></pre>
        </div>
    </div>

    <script>
        document.getElementById('matchForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const form = e.target;
            const formData = new FormData(form);
            const btn = document.getElementById('submitBtn');
            const resultDiv = document.getElementById('result');
            const jsonOutput = document.getElementById('jsonOutput');
            
            btn.textContent = 'Processing...';
            btn.disabled = true;
            resultDiv.style.display = 'none';
            
            try {
                const response = await fetch('/match', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (response.ok) {
                    jsonOutput.textContent = JSON.stringify(data, null, 2);
                    jsonOutput.style.color = '#a6e22e'; // Monokai green for success json
                } else {
                    jsonOutput.textContent = 'Error: ' + JSON.stringify(data, null, 2);
                    jsonOutput.style.color = '#f92672'; // Monokai red for error
                }
                resultDiv.style.display = 'block';
            } catch (error) {
                jsonOutput.textContent = 'Network Error: ' + error.message;
                jsonOutput.style.color = '#f92672';
                resultDiv.style.display = 'block';
            } finally {
                btn.textContent = 'Calculate Match Score';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
